<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluxo — Controle financeiro estratégico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand">
          <div class="brand-mark">◇</div>
          <strong>Fluxo</strong>
        </div>

        <div class="period-navigator">
          <button type="button" class="btn-nav" id="btnPrevMonth">❮</button>
          <div class="current-period-display">
            <span id="displayMonth">...</span>
            <span id="displayYear">...</span>
          </div>
          <button type="button" class="btn-nav" id="btnNextMonth">❯</button>
          <button type="button" class="btn btn-ghost btn-sm" id="btnToday">Hoje</button>
        </div>

        <div class="header-actions">
          <button class="btn btn-primary" id="btnNewTransaction">+ Novo Lançamento</button>
          <button class="btn btn-ghost" id="btnOpenSettings">⚙️</button>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="toolbar">
        <div id="kpi-container" class="kpi-grid"></div>
        <select id="monthFilter" style="display:none" multiple></select>
      </div>

      <div class="card card-table">
        <div class="card-header">
          <h2>Lançamentos</h2>
          <button class="btn btn-ghost btn-sm" id="btnSyncNow">🔄 Sincronizar Monday</button>
        </div>
        <div class="table-responsive">
          <table id="mainTable">
            <thead>
              <tr>
                <th>Status</th>
                <th>Data</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Valor</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
